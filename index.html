<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>PlayHub – App Sharing Platform</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="site-header">
    <div class="brand"><a href="#/">PlayHub</a></div>
    <nav class="nav">
      <a href="#/">Explore</a>
      <a href="#/upload" id="nav-upload" style="display:none">Upload</a>
      <a href="#/admin" id="nav-admin" style="display:none">Admin</a>
      <a href="#/login" id="nav-login">Login / Register</a>
      <button id="logout-btn" class="btn-link" style="display:none">Logout</button>
    </nav>
  </header>

  <main id="app" class="container"></main>

  <footer class="site-footer">
    <p>PlayHub – App Sharing Platform | Connected to API at <code>http://localhost:5000/api</code></p>
  </footer>

  <script src="app.js"></script>
</body>
</html>
